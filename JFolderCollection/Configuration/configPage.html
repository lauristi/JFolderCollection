<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>JFolderCollection Config</title>
</head>
<body>
    <div id="TemplateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox,directorybrowser">
        <div data-role="content">
            <div class="content-primary">

                <h2>JFolderCollection vBUILD_VERSION</h2>

                <form id="TemplateConfigForm">

                    <div class="verticalSection">
                        <h2 class="sectionTitle">Diretórios do Servidor</h2>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="BaseFolderPath">Caminho da Coleção de Filmes</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input id="BaseFolderPath" name="BaseFolderPath" type="text" is="emby-input" />
                                <button type="button" is="emby-button" class="raised button-submit" id="browseBaseFolder">
                                    <span>Browse</span>
                                </button>
                            </div>
                            <div class="fieldDescription">Informe o caminho onde os filmes estão organizados por pastas.</div>
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PosterFolderPath">Caminho dos Posters</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input id="PosterFolderPath" name="PosterFolderPath" type="text" is="emby-input" />
                                <button type="button" is="emby-button" class="raised button-submit" id="browsePosterFolder">
                                    <span>Browse</span>
                                </button>
                            </div>
                            <div class="fieldDescription">Pasta contendo os arquivos .png (mesmo nome da pasta do filme).</div>
                        </div>
                    </div>

                    <div class="verticalSection">
                        <h2 class="sectionTitle">Regras de Processamento</h2>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PrefixAtual">Buscar por (Prefixo)</label>
                            <input id="PrefixAtual" type="text" is="emby-input" />
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PrefixNovo">Substituir por</label>
                            <input id="PrefixNovo" type="text" is="emby-input" />
                        </div>

                        <div class="checkboxContainer">
                            <label class="checkboxLabel">
                                <input type="checkbox" is="emby-checkbox" id="OnlyNew" checked />
                                <span>Criar apenas novas coleções</span>
                            </label>
                        </div>

                        <div class="checkboxContainer">
                            <label class="checkboxLabel">
                                <input type="checkbox" is="emby-checkbox" id="ApagarTudo" />
                                <span>Apagar todas as coleções atuais antes de criar</span>
                            </label>
                        </div>
                    </div>

                    <div class="verticalSection">
                        <button id="createCollectionsBtn" is="emby-button" type="button" class="raised block emby-button" style="background-color: #2e7d32; color: white; padding: 0.8em; font-weight: bold;">
                            <span>EXECUTAR CRIAÇÃO DE COLEÇÕES</span>
                        </button>
                    </div>

                    <div class="verticalSection">
                        <h2 class="sectionTitle">Ferramentas</h2>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                            <button id="loadFoldersBtn" is="emby-button" type="button" class="raised emby-button">
                                <span>Listar Pastas</span>
                            </button>
                            <button id="findDuplicatesBtn" is="emby-button" type="button" class="raised emby-button" style="background-color: #2e7d32; color: white;">
                                <span>Buscar Duplicados</span>
                            </button>
                        </div>

                        <div id="folderListContainer" style="display: none; margin-bottom: 20px;">
                            <div class="paperList" style="max-height: 300px; overflow-y: auto;">
                                <ul id="folderList" class="itemsContainer vertical-list"></ul>
                            </div>
                        </div>

                        <div id="duplicatesListContainer" style="display: none; margin-bottom: 20px;">
                            <div id="duplicatesList" class="itemsContainer vertical-list"></div>
                        </div>
                    </div>

                    <div style="margin-top: 2em; border-top: 1px solid #333; padding-top: 1em;">
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Salvar Configurações</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            (function () {
                const pluginId = "c7b8d1b3-41d9-4a19-b04e-f43534455342";

                document.querySelector('#TemplateConfigPage').addEventListener('pageshow', function () {
                    Dashboard.showLoadingMsg();
                    const page = this;

                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        page.querySelector('#BaseFolderPath').value = config.BaseFolderPath || '';
                        page.querySelector('#PosterFolderPath').value = config.PosterFolderPath || '';
                        page.querySelector('#PrefixAtual').value = config.PrefixAtual || '';
                        page.querySelector('#PrefixNovo').value = config.PrefixNovo || '';
                        page.querySelector('#ApagarTudo').checked = config.ApagarTudo || false;
                        page.querySelector('#OnlyNew').checked = config.OnlyNew !== undefined ? config.OnlyNew : true;
                        Dashboard.hideLoadingMsg();
                    });

                    page.querySelector('#browseBaseFolder').onclick = function () { openDirectoryBrowser('BaseFolderPath'); };
                    page.querySelector('#browsePosterFolder').onclick = function () { openDirectoryBrowser('PosterFolderPath'); };

                    page.querySelector('#createCollectionsBtn').onclick = executeCreateCollections;
                    page.querySelector('#findDuplicatesBtn').onclick = loadDuplicateMovies;
                    page.querySelector('#loadFoldersBtn').onclick = loadFolders;

                    page.querySelector('#TemplateConfigForm').onsubmit = function (e) {
                        e.preventDefault();
                        saveSettings(page);
                        return false;
                    };
                });

                function saveSettings(page) {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        config.BaseFolderPath = page.querySelector('#BaseFolderPath').value;
                        config.PosterFolderPath = page.querySelector('#PosterFolderPath').value;
                        config.PrefixAtual = page.querySelector('#PrefixAtual').value;
                        config.PrefixNovo = page.querySelector('#PrefixNovo').value;
                        config.ApagarTudo = page.querySelector('#ApagarTudo').checked;
                        config.OnlyNew = page.querySelector('#OnlyNew').checked;

                        ApiClient.updatePluginConfiguration(pluginId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                    });
                }

                function executeCreateCollections() {
                    const deleteAll = document.getElementById('ApagarTudo').checked;
                    if (!confirm("Deseja iniciar a criação das coleções agora?")) return;

                    if (deleteAll) {
                        if (!confirm("⚠️ ATENÇÃO: Você marcou para APAGAR TODAS as coleções existentes. Deseja continuar?")) {
                            return;
                        }
                    }

                    const props = {
                        currentPrefix: document.getElementById('PrefixAtual').value,
                        newPrefix: document.getElementById('PrefixNovo').value,
                        baseFolderPath: document.getElementById('BaseFolderPath').value,
                        posterFolderPath: document.getElementById('PosterFolderPath').value,
                        deleteAll: deleteAll,
                        onlyNew: document.getElementById('OnlyNew').checked
                    };

                    Dashboard.showLoadingMsg();
                    const url = ApiClient.getUrl('Plugin/Folder/CreateCollections');

                    ApiClient.fetch({
                        url: url,
                        type: 'POST',
                        data: JSON.stringify(props),
                        contentType: 'application/json'
                    }).then(function (res) {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert("✅ Operação finalizada!");
                    }).catch(function (err) {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert("❌ Erro: " + err);
                    });
                }

                function openDirectoryBrowser(inputId) {
                    const input = document.getElementById(inputId);
                    require(['directorybrowser'], function (DirectoryBrowser) {
                        const picker = new DirectoryBrowser();
                        picker.show({
                            callback: function (path) {
                                if (path) { input.value = path; }
                                picker.close();
                            },
                            path: input.value,
                            validateWriteable: false
                        });
                    });
                }

                function loadFolders() {
                    const path = document.getElementById('BaseFolderPath').value;
                    // O Jellyfin resolve as rotas dos plugins via ApiClient
                    const url = ApiClient.getUrl('Plugin/Folder/Subfolders', { path: path });

                    Dashboard.showLoadingMsg();
                    ApiClient.getJSON(url).then(function (folders) {
                        const list = document.getElementById('folderList');
                        list.innerHTML = folders.map(f => `<li>${f}</li>`).join('');
                        document.getElementById('folderListContainer').style.display = 'block';
                        Dashboard.hideLoadingMsg();
                    }).catch(function () {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert("Erro ao listar pastas. Verifique o caminho.");
                    });
                }

                function loadDuplicateMovies() {
                    const path = document.getElementById('BaseFolderPath').value;
                    const url = ApiClient.getUrl('Plugin/Folder/DuplicateMovies', { path: path });

                    Dashboard.showLoadingMsg();
                    ApiClient.getJSON(url).then(function (result) {
                        const container = document.getElementById('duplicatesListContainer');
                        const list = document.getElementById('duplicatesList');

                        if (result.Duplicates.length === 0) {
                            list.innerHTML = '<p>Nenhum duplicado encontrado.</p>';
                        } else {
                            list.innerHTML = result.Duplicates.map(d => `
                <div style="margin-bottom:10px; border-bottom:1px solid #444;">
                    <strong>${d.MovieName}</strong> (${d.Count} cópias)<br/>
                    <small>${d.Locations.join('<br/>')}</small>
                </div>
            `).join('');
                        }
                        container.style.display = 'block';
                        Dashboard.hideLoadingMsg();
                    });
                }

            })();
        </script>
    </div>
</body>
</html>
