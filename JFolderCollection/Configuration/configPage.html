<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>Lista de Subpastas</title>
</head>
<body>
    <div id="TemplateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox">
        <div data-role="content">
            <div class="content-primary">
                <h2>Criação de coleções automáticas v. 1.0.0.13</h2>

                <form id="TemplateConfigForm">
                    <!-- Pasta Base -->
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="BaseFolderPath">Pasta base</label>
                        <input id="BaseFolderPath" name="BaseFolderPath" type="text" is="emby-input" />
                        <div class="fieldDescription">Caminho base para listar subpastas</div>
                    </div>

                    <!-- Botão Salvar -->
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Salvar Configuração</span>
                        </button>
                    </div>
                </form>

                <!-- Ações Adicionais -->
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--card-border-color, #383838);">
                    <h3>Ações</h3>

                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                        <button id="logTestBtn" is="emby-button" type="button" class="raised emby-button">
                            <span>Gerar Log de Teste</span>
                        </button>

                        <button id="loadFoldersBtn" is="emby-button" type="button" class="raised emby-button">
                            <span>Carregar Subpastas</span>
                        </button>
                    </div>

                    <!-- Lista de Pastas - CORRIGIDO -->
                    <div id="folderListContainer" style="display: none;">
                        <div class="verticalSection">
                            <div class="sectionTitleContainer">
                                <h2 class="sectionTitle">
                                    Subpastas Encontradas
                                    <span id="folderCount" class="badge" style="margin-left: 8px;">0</span>
                                </h2>
                            </div>

                            <div class="paperList" style="max-height: 400px; overflow-y: auto;">
                                <div class="readOnlyContent">
                                    <ul id="folderList" class="itemsContainer vertical-list" style="margin: 0; padding: 0;"></ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="text/javascript">
            var TemplateConfig = {
                pluginUniqueId: 'c7b8d1b3-41d9-4a19-b04e-f43534455342'
            };

            // ✅ CARREGAMENTO NO PADRÃO OFICIAL
            document.querySelector('#TemplateConfigPage').addEventListener('pageshow', function () {
                console.log("📄 Página do plugin carregada");
                Dashboard.showLoadingMsg();

                ApiClient.getPluginConfiguration(TemplateConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#BaseFolderPath').value = config.BaseFolderPath || '/mnt/xs1000/Filmes/Filmes Colecoes';
                    Dashboard.hideLoadingMsg();
                }).catch(function (error) {
                    console.error('Erro ao carregar configuração:', error);
                    Dashboard.hideLoadingMsg();
                });
            });

            // ✅ FORM SUBMIT NO PADRÃO OFICIAL
            document.querySelector('#TemplateConfigForm').addEventListener('submit', function (e) {
                Dashboard.showLoadingMsg();

                ApiClient.getPluginConfiguration(TemplateConfig.pluginUniqueId).then(function (config) {
                    config.BaseFolderPath = document.querySelector('#BaseFolderPath').value;

                    ApiClient.updatePluginConfiguration(TemplateConfig.pluginUniqueId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                        Dashboard.hideLoadingMsg();
                    }).catch(function (error) {
                        console.error('Erro ao salvar:', error);
                        Dashboard.hideLoadingMsg();
                    });
                });

                e.preventDefault();
                return false;
            });

            // ✅ BOTÕES ADICIONAIS
            document.getElementById('logTestBtn').addEventListener('click', function () {
                console.log("🔄 Gerando log de teste...");
                Dashboard.showLoadingMsg();

                fetch('/Plugin/Folder/logTest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                }).then(function (response) {
                    Dashboard.hideLoadingMsg();

                    if (response.ok) {
                        Dashboard.alert('Log gerado com sucesso!');
                        console.log("✅ Log criado");
                    } else {
                        throw new Error('HTTP ' + response.status);
                    }
                }).catch(function (error) {
                    Dashboard.hideLoadingMsg();
                    console.error('Erro ao gerar log:', error);
                    Dashboard.alert('Erro ao gerar log: ' + error.message);
                });
            });

            document.getElementById('loadFoldersBtn').addEventListener('click', function () {
                var basePath = document.querySelector('#BaseFolderPath').value;
                console.log("📁 Carregando pastas de:", basePath);
                Dashboard.showLoadingMsg();

                fetch('/Plugin/Folder/Subfolders?path=' + encodeURIComponent(basePath))
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error('HTTP ' + response.status);
                        }
                        return response.json();
                    })
                    .then(function (folders) {
                        Dashboard.hideLoadingMsg();

                        var folderList = document.getElementById('folderList');
                        var container = document.getElementById('folderListContainer');
                        var folderCount = document.getElementById('folderCount');

                        if (folders && folders.length > 0) {
                            // Atualiza contador
                            folderCount.textContent = folders.length;

                            // ✅ CORREÇÃO: Use nome de variável diferente
                            folderList.innerHTML = folders.map(function (f) {
                                return '<li class="listItem listItem-border" style="padding: 8px 12px;">' +
                                    '<div class="listItemIcon material-icons" style="margin-right: 12px; color: var(--accent-color); font-size: 18px;">folder</div>' +
                                    '<div class="listItemBody" style="flex: 1;">' +
                                    '<div class="listItemBodyText" style="font-size: 14px;">' + f + '</div>' +
                                    '</div>' +
                                    '</li>';
                            }).join('');

                            container.style.display = 'block';
                            Dashboard.alert('Encontradas ' + folders.length + ' subpastas');
                        } else {
                            folderCount.textContent = '0';
                            folderList.innerHTML = `
                                        <li class="listItem" style="padding: 12px;">
                                            <div class="listItemBody">
                                                <div class="listItemBodyText" style="color: var(--text-muted-color); text-align: center;">Nenhuma subpasta encontrada</div>
                                            </div>
                                        </li>
                                    `;
                            container.style.display = 'block';
                            Dashboard.alert('Nenhuma subpasta encontrada');
                        }
                    })
                    .catch(function (error) {
                        Dashboard.hideLoadingMsg();
                        console.error('Erro ao carregar pastas:', error);
                        Dashboard.alert('Erro ao carregar pastas: ' + error.message);
                    });
            });
        </script>
    </div>
</body>
</html>
