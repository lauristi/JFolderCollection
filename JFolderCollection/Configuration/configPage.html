<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>JFolderCollection Config</title>
</head>
<body>
    <div id="TemplateConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button,emby-select,emby-checkbox,directorybrowser">
        <div data-role="content">
            <div class="content-primary">

                <h2>JFolderCollection vBUILD_VERSION</h2>

                <form id="TemplateConfigForm">

                    <div class="verticalSection">
                        <h2 class="sectionTitle">Diretórios do Servidor</h2>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="BaseFolderPath">Caminho da Coleção de Filmes</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input id="BaseFolderPath" name="BaseFolderPath" type="text" is="emby-input" />
                                <button type="button" is="emby-button" class="raised button-submit" id="browseBaseFolder">
                                    <span>Browse</span>
                                </button>
                            </div>
                            <div class="fieldDescription">Informe o caminho onde os filmes estão organizados por pastas.</div>
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PosterFolderPath">Caminho dos Posters</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input id="PosterFolderPath" name="PosterFolderPath" type="text" is="emby-input" />
                                <button type="button" is="emby-button" class="raised button-submit" id="browsePosterFolder">
                                    <span>Browse</span>
                                </button>
                            </div>
                            <div class="fieldDescription">Pasta contendo os arquivos .png (mesmo nome da pasta do filme).</div>
                        </div>
                    </div>
                    <div class="verticalSection">
                        <h2 class="sectionTitle">Ferramentas</h2>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                            <button id="loadFoldersBtn" is="emby-button" type="button" class="raised emby-button">
                                <span>Listar Pastas</span>
                            </button>
                            <button id="findDuplicatesBtn" is="emby-button" type="button" class="raised emby-button" style="background-color: #ff6b6b;">
                                <span>Buscar Duplicados</span>
                            </button>
                        </div>

                        <div id="folderListContainer" style="display: none; margin-bottom: 20px;">
                            <div class="paperList" style="max-height: 300px; overflow-y: auto;">
                                <ul id="folderList" class="itemsContainer vertical-list"></ul>
                            </div>
                        </div>

                        <div id="duplicatesListContainer" style="display: none; margin-bottom: 20px;">
                            <div id="duplicatesList" class="itemsContainer vertical-list"></div>
                        </div>
                    </div>
                    <div class="verticalSection">
                        <h2 class="sectionTitle">Regras de Processamento</h2>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PrefixAtual">Buscar por (Prefixo)</label>
                            <input id="PrefixAtual" type="text" is="emby-input" />
                        </div>

                        <div class="inputContainer">
                            <label class="inputLabel inputLabelUnfocused" for="PrefixNovo">Substituir por</label>
                            <input id="PrefixNovo" type="text" is="emby-input" />
                        </div>

                        <div class="checkboxContainer">
                            <label class="checkboxLabel">
                                <input type="checkbox" is="emby-checkbox" id="ApagarTudo" />
                                <span>Apagar todas as coleções atuais antes de criar</span>
                            </label>
                        </div>

                        <div class="checkboxContainer">
                            <label class="checkboxLabel">
                                <input type="checkbox" is="emby-checkbox" id="OnlyNew" checked />
                                <span>Criar apenas coleções inexistentes (Skip)</span>
                            </label>
                        </div>
                    </div>
                    <div style="margin-top: 2em;">
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Salvar Configurações</span>
                        </button>

                        <button id="createCollectionsBtn" is="emby-button" type="button" class="raised button-submit block emby-button" style="margin-top: 10px; background: var(--accent-color);">
                            <span>EXECUTAR CRIAÇÃO DE COLEÇÕES</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            // #region Configurações Iniciais
            var TemplateConfig = {
                pluginUniqueId: 'c7b8d1b3-41d9-4a19-b04e-f43534455342'
            };
            // #endregion

            // #region Funções de Navegação e UI
            function openDirectoryBrowser(targetInputId) {
                const input = document.getElementById(targetInputId);

                // O require no Jellyfin pode ser sensível a maiúsculas/minúsculas dependendo da versão
                require(['directorybrowser'], function (DirectoryBrowser) {
                    try {
                        const picker = new DirectoryBrowser();

                        picker.show({
                            callback: function (path) {
                                if (path) {
                                    input.value = path;
                                    // Dispara o evento de mudança para que o formulário saiba que o valor mudou
                                    input.dispatchEvent(new Event('change', { bubbles: true }));
                                }
                                picker.close();
                            },
                            header: 'Selecionar Pasta',
                            instruction: 'Escolha o diretório desejado no servidor.',
                            path: input.value || '',
                            validateWriteable: false
                        });
                    } catch (err) {
                        console.error("❌ Erro ao instanciar o DirectoryBrowser:", err);
                        Dashboard.alert("Erro ao abrir o seletor de pastas. Verifique o console.");
                    }
                });
            }
            // #endregion

            // #region Lógica de Negócio (API Calls)

            // Busca filmes duplicados no caminho informado
            async function loadDuplicateMovies() {
                const basePath = document.querySelector('#BaseFolderPath').value;
                if (!basePath) return Dashboard.alert('⚠️ Informe o caminho base.');

                Dashboard.showLoadingMsg();
                try {
                    const response = await ApiClient.getJSON(ApiClient.getUrl('Plugin/Folder/DuplicateMovies', { path: basePath }));
                    renderDuplicates(response); // Função auxiliar de renderização
                } catch (e) {
                    Dashboard.alert("Erro: " + e.message);
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            }

            // Envia comando para o Controller criar as coleções
            function executeCreateCollections() {
                const props = {
                    currentPrefix: document.getElementById('PrefixAtual').value,
                    newPrefix: document.getElementById('PrefixNovo').value,
                    baseFolderPath: document.getElementById('BaseFolderPath').value,
                    posterFolderPath: document.getElementById('PosterFolderPath').value,
                    deleteAll: document.getElementById('ApagarTudo').checked,
                    onlyNew: document.getElementById('OnlyNew').checked
                };

                if (props.deleteAll && !confirm("⚠️ Isso apagará TODAS as coleções. Confirmar?")) return;

                Dashboard.showLoadingMsg();
                const url = ApiClient.getUrl('Plugin/Folder/CreateCollections', props);

                fetch(url, { method: 'POST', headers: { 'X-Emby-Token': ApiClient.accessToken() } })
                    .then(r => r.json())
                    .then(res => {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert("✅ Finalizado: " + res.Message);
                    })
                    .catch(err => {
                        Dashboard.hideLoadingMsg();
                        Dashboard.alert("❌ Erro na API: " + err.message);
                    });
            }
            // #endregion

            // #region Gerenciamento de Ciclo de Vida do Plugin
            function loadSettings() {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(TemplateConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#BaseFolderPath').value = config.BaseFolderPath || '';
                    document.querySelector('#PosterFolderPath').value = config.PosterFolderPath || '';
                    document.querySelector('#PrefixAtual').value = config.PrefixAtual || '';
                    document.querySelector('#PrefixNovo').value = config.PrefixNovo || '';
                    document.querySelector('#ApagarTudo').checked = config.ApagarTudo || false;
                    document.querySelector('#OnlyNew').checked = config.OnlyNew !== undefined ? config.OnlyNew : true;
                    Dashboard.hideLoadingMsg();
                });
            }

            function saveSettings(e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(TemplateConfig.pluginUniqueId).then(function (config) {
                    config.BaseFolderPath = document.querySelector('#BaseFolderPath').value;
                    config.PosterFolderPath = document.querySelector('#PosterFolderPath').value;
                    config.PrefixAtual = document.querySelector('#PrefixAtual').value;
                    config.PrefixNovo = document.querySelector('#PrefixNovo').value;
                    config.ApagarTudo = document.querySelector('#ApagarTudo').checked;
                    config.OnlyNew = document.querySelector('#OnlyNew').checked;

                    ApiClient.updatePluginConfiguration(TemplateConfig.pluginUniqueId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });
            }
            // #endregion

            // #region Eventos de Interface
            document.addEventListener('DOMContentLoaded', () => {
                loadSettings();
                document.getElementById('browseBaseFolder').addEventListener('click', () => openDirectoryBrowser('BaseFolderPath'));
                document.getElementById('browsePosterFolder').addEventListener('click', () => openDirectoryBrowser('PosterFolderPath'));
                document.getElementById('createCollectionsBtn').addEventListener('click', executeCreateCollections);
                document.getElementById('findDuplicatesBtn').addEventListener('click', loadDuplicateMovies);
                document.querySelector('#TemplateConfigForm').addEventListener('submit', saveSettings);
            });
            // #endregion
        </script>
    </div>
</body>
</html>
